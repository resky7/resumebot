<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeBot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
      color: #fff;
    }
    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }
    .btn {
      display: block;
      background-color: #007bff;
      color: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    .lang-switch {
      margin: 20px 0;
    }
    .lang-btn {
      margin: 0 5px;
      padding: 5px 10px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #888;
    }
    .section {
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">ResumeBot</h1>

    <!-- Переключение языков -->
    <div class="lang-switch">
      <button class="lang-btn" onclick="setLang('lt')">LT</button>
      <button class="lang-btn" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <!-- О сервисе -->
    <div class="section">
      <h2 id="about-title"></h2>
      <p id="about-text"></p>
    </div>

    <!-- Оплата -->
    <div class="section">
      <h2 id="payment-title"></h2>
      <a href="https://paypal.me/chetresky" class="btn" target="_blank">💳 <span id="btn-paypal"></span></a>
      <a href="https://forms.gle/" class="btn" target="_blank">📝 <span id="btn-form"></span></a>
      <a href="https://paypal.me/chetresky" class="btn" target="_blank">🚀 <span id="btn-plus"></span></a>
    </div>

    <!-- Контакты -->
    <div class="section">
      <h2 id="contact-title"></h2>
      <p id="contact-text"></p>
      <p>📩 <a href="mailto:resky.sup01@gmail.com" style="color:#00aaff">resky.sup01@gmail.com</a></p>
    </div>

    <div class="footer">© 2025 ResumeBot</div>
  </div>

  <script>
    const content = {
      lt: {
        aboutTitle: "Apie ResumeBot",
        aboutText: "ResumeBot padeda jums sukurti profesionalų gyvenimo aprašymą vos per kelias minutes. Pasirinkite kalbą, užpildykite formą ir gaukite paruoštą CV.",
        paymentTitle: "Kaip sumokėti",
        btnPaypal: "Apmokėti per PayPal",
        btnForm: "Užpildyti Google formą",
        btnPlus: "Užsisakyti planą „Plius“",
        contactTitle: "Kontaktai",
        contactText: "Jeigu turite klausimų – susisiekite su mumis el. paštu."
      },
      ru: {
        aboutTitle: "О ResumeBot",
        aboutText: "ResumeBot помогает создать профессиональное резюме всего за несколько минут. Выберите язык, заполните форму и получите готовое CV.",
        paymentTitle: "Как оплатить",
        btnPaypal: "Оплатить через PayPal",
        btnForm: "Заполнить Google форму",
        btnPlus: "Заказать тариф «Плюс»",
        contactTitle: "Контакты",
        contactText: "Если у вас есть вопросы – пишите нам на почту."
      },
      en: {
        aboutTitle: "About ResumeBot",
        aboutText: "ResumeBot helps you create a professional resume in just a few minutes. Choose your language, fill out the form, and get your CV ready.",
        paymentTitle: "How to Pay",
        btnPaypal: "Pay via PayPal",
        btnForm: "Fill Google Form",
        btnPlus: "Order 'Plus' Plan",
        contactTitle: "Contacts",
        contactText: "If you have any questions – feel free to email us."
      }
    };

    function setLang(lang) {
      document.getElementById("about-title").innerText = content[lang].aboutTitle;
      document.getElementById("about-text").innerText = content[lang].aboutText;
      document.getElementById("payment-title").innerText = content[lang].paymentTitle;
      document.getElementById("btn-paypal").innerText = content[lang].btnPaypal;
      document.getElementById("btn-form").innerText = content[lang].btnForm;
      document.getElementById("btn-plus").innerText = content[lang].btnPlus;
      document.getElementById("contact-title").innerText = content[lang].contactTitle;
      document.getElementById("contact-text").innerText = content[lang].contactText;
    }

    // Стартовый язык (RU)
    setLang("ru");
  </script>
</body>
</html>
